<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaintsHub Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="#000"/>
          <text x="50%" y="55%" text-anchor="middle" dy=".35em" fill="#fff" font-size="18" font-weight="700" font-family="Inter">S</text>
        </svg>
      </div>
      <h1 class="login-title">SAINTSHUB ADMIN</h1>
      <p class="login-subtitle">Sign in to manage your platform</p>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="admin@saintshub.net" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <div id="login-error" class="form-error" style="display:none;"></div>
        <button type="submit" id="login-btn" class="btn btn-primary btn-full">
          <span class="btn-text">SIGN IN</span>
          <span class="btn-loader" style="display:none;">
            <span class="spinner"></span>
          </span>
        </button>
      </form>
    </div>
  </div>

  <!-- Main App Shell -->
  <div id="app-shell" class="app-shell" style="display:none;">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="#fff"/>
          <text x="50%" y="55%" text-anchor="middle" dy=".35em" fill="#000" font-size="18" font-weight="700" font-family="Inter">S</text>
        </svg>
        <span class="sidebar-brand">SAINTSHUB</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="#" class="nav-item" data-page="upgrade-requests">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="10"/></svg>
          Upgrade Requests
          <span id="nav-badge" class="nav-badge" style="display:none;">0</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn btn-ghost btn-full">SIGN OUT</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header class="page-header">
        <div>
          <h1 id="page-title" class="page-title">DASHBOARD</h1>
          <p id="page-desc" class="page-desc">Overview of your platform</p>
        </div>
        <div class="header-actions">
          <span id="admin-name" class="admin-name"></span>
        </div>
      </header>

      <!-- Page Container -->
      <div id="page-container" class="page-container">
        <!-- Content injected by JS -->
      </div>
    </main>
  </div>

  <!-- Email Modal -->
  <div id="email-modal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title">SEND EMAIL</h2>
        <button id="email-modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <p id="email-modal-to" class="modal-to"></p>
        <div class="form-group">
          <label for="email-subject">Subject</label>
          <input type="text" id="email-subject" placeholder="RE: Your Upgrade Request">
        </div>
        <div class="form-group">
          <label for="email-message">Message</label>
          <textarea id="email-message" rows="6" placeholder="Write your message to the user..."></textarea>
        </div>
        <div id="email-modal-error" class="form-error" style="display:none;"></div>
      </div>
      <div class="modal-footer">
        <button id="email-cancel-btn" class="btn btn-ghost">CANCEL</button>
        <button id="email-send-btn" class="btn btn-primary">
          <span class="btn-text">SEND EMAIL</span>
          <span class="btn-loader" style="display:none;"><span class="spinner"></span></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirm-modal" class="modal-overlay" style="display:none;">
    <div class="modal-card modal-card-sm">
      <div class="modal-header">
        <h2 id="confirm-title" class="modal-title">CONFIRM</h2>
        <button id="confirm-modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <p id="confirm-message" class="confirm-message"></p>
      </div>
      <div class="modal-footer">
        <button id="confirm-cancel-btn" class="btn btn-ghost">CANCEL</button>
        <button id="confirm-ok-btn" class="btn btn-primary">
          <span class="btn-text">CONFIRM</span>
          <span class="btn-loader" style="display:none;"><span class="spinner"></span></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" style="display:none;">
    <span id="toast-message"></span>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
